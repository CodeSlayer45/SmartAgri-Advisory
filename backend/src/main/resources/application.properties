spring.application.name=smart-agri-advisory
server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_agri?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:smartagri_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

openweather.api.key=${OPENWEATHER_API_KEY:}

openai.api.key=${OPENAI_API_KEY:}
openai.api.enabled=${OPENAI_ENABLED:false}
openai.api.model=gpt-4o-mini
advisory.alert.cron=${ADVISORY_ALERT_CRON:0 0 */6 * * *}
app.security.api-key=${APP_API_KEY:change-me-local}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
