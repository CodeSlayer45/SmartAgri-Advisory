# Render/Railway set PORT; local prod can use SERVER_PORT
server.port=${PORT:${SERVER_PORT:8081}}

# Same defaults as dev so prod profile still starts locally if env vars are not set.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_agri?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:smartagri_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

openweather.api.key=${OPENWEATHER_API_KEY:}
openai.api.key=${OPENAI_API_KEY}
openai.api.enabled=${OPENAI_ENABLED:false}
openai.api.model=${OPENAI_MODEL:gpt-4o-mini}
advisory.alert.cron=${ADVISORY_ALERT_CRON:0 0 */6 * * *}
app.security.api-key=${APP_API_KEY:change-me-local}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.com.smartagri=INFO
